
{% extends 'tasks/base.html' %}
{% block content %}
  <h1>My Tasks</h1>
  <a href="{% url 'task-create' %}">+ New Task</a>
  <ul>
    {% for task in tasks %}
      <li>
        <a href="{% url 'task-detail' task.pk %}">{{ task.title }}</a>
        — {{ task.priority }} {% if task.is_completed %}(done){% endif %}
      </li>
    {% empty %}
      <li>No tasks yet.</li>
    {% endfor %}
  </ul>
{% endblock %}
